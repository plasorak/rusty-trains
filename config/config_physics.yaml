simulation:
  time_step_s: 30.0                     # integration step (s)
  duration_s:  2000.0                   # total simulated time (s)

  trains:
    - id: "train_1"
      kind: physics
      train:
        power: 2460000.0                    # W  (max traction power)
        traction_force_at_standstill: 409000.0  # N
        max_speed: 120.0                    # km/h
        mass: 2000000.0                     # kg
        drag_coeff: 10.0                    # kg/m (aerodynamic)
        braking_force: 800000.0             # N
      environment:
        gradient: 0.01                      # rise/run (1 % uphill)
        wind_speed: 0.0                     # m/s (head-wind positive)
      driver:
        power_ratio: 0.8                    # 0–1 throttle
        break_ratio: 0.0                    # 0–1 braking

    - id: "train_2"
      kind: physics
      train:
        power: 2460000.0
        traction_force_at_standstill: 409000.0
        max_speed: 100.0
        mass: 1500000.0
        drag_coeff: 8.0
        braking_force: 600000.0
      environment:
        gradient: 0.0
        wind_speed: 5.0                     # m/s head-wind
      driver:
        power_ratio: 1.0
        break_ratio: 0.0
