simulation:
  time_step_s: 0.1                      # integration step (s)
  duration_s:  3600.0                   # total simulated time (s)

  infrastructure_file: network.xml

  trains:
    - id: "simulated_express"
      kind: railml
      railml_file: output.xml
      formation_id: formation_class66_mk3
      timetable_train_id: "OT_SimulatedExpress"
      environment:
        gradient: 0.01
        wind_speed: 0.0
      driver:
        power_ratio: 0.8
        brake_ratio: 0.0

    # Timing-traced trains: position interpolated from berth timing data when
    # available; physics (driver + environment below) used as fallback for any
    # gaps or out-of-range periods.  speed_kmh and acceleration_mss are null
    # in the output whenever the timing trace is used.
    - id: "1A23"
      kind: railml
      railml_file: output.xml
      formation_id: formation_class66_mk3
      timetable_train_id: "OT_1A23"
      timing_file: berth_timing.parquet
      environment:
        gradient: 0.0
        wind_speed: 0.0
      driver:
        power_ratio: 0.8
        brake_ratio: 0.0

    - id: "2B45"
      kind: railml
      railml_file: output.xml
      formation_id: formation_class66_mk3
      timetable_train_id: "OT_2B45"
      timing_file: berth_timing.parquet
      timing_train_id: "1A23"     # this service uses the same timing data as 1A23
      environment:
        gradient: 0.0
        wind_speed: 0.0
      driver:
        power_ratio: 0.8
        brake_ratio: 0.0
