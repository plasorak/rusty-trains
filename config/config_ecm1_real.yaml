simulation:
  time_step_s: 10.0
  duration_s:  14400.0   # 4 h; Class 66 at 0.8 throttle covers ECM1 (~256 km) in roughly 3 h

  # Generated by `uv run make-ecm1-railml ecm1_network.xml`.
  # Contains real ECM1 track geometry from assets/NWR_GTCL20260309.gpkg.
  infrastructure_file: examples/ecm1/ecm1_network.xml

  trains:
    - id: "OT_ECM1_Real"
      kind: railml
      railml_file: output.xml
      formation_id: formation_class66_mk3
      timetable_train_id: "OT_ECM1_Real"
      environment:
        gradient: 0.001   # ECM1 net elevation gain is modest; 0.1 % is a fair constant approximation
        wind_speed: 0.0
      driver:
        power_ratio: 0.8
        brake_ratio: 0.0
