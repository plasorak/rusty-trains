simulation:
  time_step_s: 1.0                      # integration step (s)
  duration_s:  600.0                    # total simulated time (s)

  # Shared RailML 3.3 file containing both <infrastructure> (topology + tracks)
  # and <timetable> (baseItineraries + itineraries + operationalTrains).
  # Generated by `uv run make-gtcl-railml network.xml --elr ECM1` and then
  # hand-edited to add a <timetable> section.
  infrastructure_file: network.xml

  trains:
    # Physics train that follows a timetable route through the network.
    # Rolling stock still comes from a separate RailML rollingstock file.
    - id: "OT_ECM1_Express"
      kind: railml
      railml_file: output.xml
      formation_id: formation_class66_mk3
      # Links this train to an <operationalTrain id="OT_ECM1_Express"> in
      # the infrastructure_file's <timetable> section.
      timetable_train_id: "OT_ECM1_Express"
      environment:
        gradient: 0.002                 # rise/run (0.2 % average uphill)
        wind_speed: 0.0
      driver:
        power_ratio: 0.8
        brake_ratio: 0.0

    # Physics train with no route — runs indefinitely as before.
    - id: "free_runner"
      kind: railml
      railml_file: output.xml
      formation_id: formation_class66_mk3
      environment:
        gradient: 0.0
        wind_speed: 0.0
      driver:
        power_ratio: 0.6
        brake_ratio: 0.0
